version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: prompt_db
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: ./entrypoint.sh
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=db
      - DB_NAME=prompt_db
      - DB_USER=pguser
      - DB_PASSWORD=pgpassword
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  postgres_data:
